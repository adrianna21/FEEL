<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FEEL — Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', sans-serif;
    background: #72d4f0;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 52px 24px 20px;
    color: #fff;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .header-date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 14px;
    color: #1a1a1a;
    font-weight: 400;
  }
  .header-date-row button {
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: #1a1a1a; padding: 0 4px;
    line-height: 1;
  }

  /* ── Toggle ── */
  .toggle-row {
    display: flex;
    justify-content: flex-start;
    padding: 0 20px 16px;
  }
  .toggle {
    display: flex;
    background: #1a1a1a;
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .toggle button {
    background: none; border: none; cursor: pointer;
    font-family: 'Roboto', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 6px 18px;
    border-radius: 16px;
    color: #888;
    transition: all 0.2s;
  }
  .toggle button.active {
    background: #fff;
    color: #1a1a1a;
  }

  /* ── Section header ── */
  .section-title {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    padding: 0 20px 10px;
  }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 18px;
    margin: 0 16px 20px;
    padding: 16px;
  }

  /* ── Emotion chips ── */
  .emotion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .chip.active { border-color: #1a1a1a; }
  .chip-badge {
    font-size: 10px;
    font-weight: 600;
    background: #1a1a1a;
    color: #fff;
    border-radius: 8px;
    padding: 1px 6px;
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    gap: 10px;
  }
  .stat-card {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-label {
    font-size: 11px;
    color: #aaa;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .stat-value.medium { font-size: 20px; }
  .stat-sub {
    font-size: 11px;
    color: #aaa;
    margin-top: 4px;
  }

  /* ── Emotion Frequency ── */
  .freq-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .freq-row:last-child { margin-bottom: 0; }
  .freq-label {
    width: 72px;
    font-size: 13px;
    color: #aaa;
    font-weight: 400;
    flex-shrink: 0;
    text-align: right;
  }
  .freq-bar-wrap {
    flex: 1;
    height: 8px;
    background: #f0f0ec;
    border-radius: 4px;
    overflow: hidden;
  }
  .freq-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: #bbb;
    transition: width 0.6s cubic-bezier(.34,1.2,.64,1);
  }
  .freq-pct {
    width: 36px;
    font-size: 12px;
    color: #aaa;
    text-align: right;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* ── Heatmap ── */
  .heatmap-grid {
    display: grid;
    grid-template-columns: 36px repeat(7, 1fr);
    gap: 5px;
    align-items: center;
  }
  .hm-day-header {
    font-size: 11px;
    font-weight: 600;
    color: #bbb;
    text-align: center;
  }
  .hm-row-label {
    font-size: 11px;
    color: #bbb;
    font-weight: 500;
    text-align: right;
    padding-right: 4px;
  }
  .hm-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    background: #f0f0ec;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .hm-cell:hover { transform: scale(1.1); }

  /* ── Weekly Patterns ── */
  .pattern-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #444;
    line-height: 1.5;
  }
  .pattern-item:last-child { margin-bottom: 0; }
  .pattern-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── Article card ── */
  .article-label {
    font-size: 11px;
    color: #bbb;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .article-img {
    width: 100%;
    height: 110px;
    background: #f0f0ec;
    border-radius: 12px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Insights</h1>
  <div class="header-date-row">
    <button id="btn-prev">&#8249;</button>
    <span id="date-range-label">May 1 - May 7, 2026</span>
    <button id="btn-next">&#8250;</button>
  </div>
</div>

<!-- Week / Month toggle -->
<div class="toggle-row">
  <div class="toggle">
    <button class="active" id="tog-week" onclick="setMode('week')">Week</button>
    <button id="tog-month" onclick="setMode('month')">Month</button>
  </div>
</div>

<!-- Emotions Tracked -->
<div class="section-title">Emotions Tracked</div>
<div class="card">
  <div class="emotion-chips" id="emotion-chips"></div>
</div>

<!-- Stats row -->
<div class="stats-row" style="margin:0 16px 20px;">
  <div class="stat-card">
    <div class="stat-label">Total logs</div>
    <div class="stat-value" id="stat-total">—</div>
    <div class="stat-sub">this week</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Most felt</div>
    <div class="stat-value medium" id="stat-most">—</div>
    <div class="stat-sub" id="stat-most-count">— times</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">X day</div>
    <div class="stat-value medium" id="stat-day">—</div>
    <div class="stat-sub" id="stat-day-sub">— x logs</div>
  </div>
</div>

<!-- Emotions Frequency -->
<div class="section-title">Emotions Frequency</div>
<div class="card" id="freq-card"></div>

<!-- Emotion Heatmap -->
<div class="section-title">Emotion Heatmap</div>
<div class="card">
  <div class="heatmap-grid" id="heatmap"></div>
</div>

<!-- Weekly Patterns -->
<div class="section-title">Weekly Patterns</div>
<div class="card" id="patterns-card"></div>

<!-- Learn more -->
<div class="section-title">Learn more about your emotions</div>
<div class="card">
  <div class="article-label">Article of the week</div>
  <div class="article-img"></div>
</div>

<script src="nav.js"></script>
<script>
/* ── helpers (match existing app conventions) ── */
function loadEmotions() {
  try { return JSON.parse(localStorage.getItem('feel_emotions') || '[]'); } catch { return []; }
}
function loadStoredData() {
  try { return JSON.parse(localStorage.getItem('feel_data') || '[]'); } catch { return []; }
}
function getEmotionByKey(emotions, val) {
  return emotions.find(e => e.value === val) || { name: 'Unknown', value: val };
}
function getCol(name) {
  const palette = {
    Sadness:'#6b9bd2', Joy:'#f5c842', Anger:'#e05c5c', Envy:'#7ec47e',
    Calm:'#a8d8b9', Contempt:'#c49bd4', Boredom:'#d4b896', Anxiety:'#f4a261',
    Frustration:'#e07b5c'
  };
  return palette[name] || '#bbb';
}

const emotions = loadEmotions().length ? loadEmotions() : [
  {name:'Sadness',value:1},{name:'Joy',value:2},{name:'Anger',value:3},
  {name:'Envy',value:4},{name:'Calm',value:5},{name:'Contempt',value:6},{name:'Boredom',value:7}
];
let allData = loadStoredData();

/* ── date window ── */
let mode = 'week'; // 'week' | 'month'
let weekOffset = 0; // 0 = current week

function getWindowBounds() {
  const today = new Date();
  if (mode === 'week') {
    const dow = today.getDay(); // 0=Sun
    const monday = new Date(today); monday.setDate(today.getDate() - ((dow + 6) % 7) + weekOffset * 7);
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
    return { start: monday, end: sunday };
  } else {
    const y = today.getFullYear(), m = today.getMonth() + weekOffset;
    const start = new Date(y, m, 1);
    const end = new Date(y, m + 1, 0, 23, 59, 59, 999);
    return { start, end };
  }
}

function formatWindowLabel() {
  const { start, end } = getWindowBounds();
  const fmt = d => d.toLocaleDateString('en-GB', { month:'short', day:'numeric' });
  if (mode === 'week') return `${fmt(start)} - ${fmt(end)}, ${end.getFullYear()}`;
  return start.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
}

function getFilteredData() {
  const { start, end } = getWindowBounds();
  return allData.filter(d => {
    const ts = new Date(d.timestamp.replace(' ','T') + 'Z');
    return ts >= start && ts <= end;
  });
}

/* ── render ── */
function render() {
  document.getElementById('date-range-label').textContent = formatWindowLabel();

  const filtered = getFilteredData();
  const { start } = getWindowBounds();

  /* Chips */
  const usedVals = [...new Set(filtered.map(d => d.button_value))];
  const newEms = emotions.filter(e => !allData.some(d => d.button_value === e.value) || usedVals.includes(e.value));
  const chips = document.getElementById('emotion-chips');
  chips.innerHTML = '';
  emotions.forEach(em => {
    const isNew = !allData.some(d => d.button_value === em.value && new Date(d.timestamp.replace(' ','T')+'Z') < start);
    const chip = document.createElement('div');
    chip.className = 'chip active';
    chip.innerHTML = em.name + (isNew ? `<span class="chip-badge">New</span>` : '');
    chips.appendChild(chip);
  });

  /* Stats */
  const total = filtered.length;
  document.getElementById('stat-total').textContent = total || '—';

  const countByEm = {};
  filtered.forEach(d => { countByEm[d.button_value] = (countByEm[d.button_value] || 0) + 1; });
  let mostVal = null, mostCnt = 0;
  Object.entries(countByEm).forEach(([v, c]) => { if (c > mostCnt) { mostVal = +v; mostCnt = c; } });
  const mostEm = mostVal ? getEmotionByKey(emotions, mostVal) : null;
  document.getElementById('stat-most').textContent = mostEm ? mostEm.name : '—';
  document.getElementById('stat-most-count').textContent = mostCnt ? `${mostCnt} times` : '';

  // busiest day
  const countByDay = {};
  filtered.forEach(d => {
    const ts = new Date(d.timestamp.replace(' ','T') + 'Z');
    const day = ts.toLocaleDateString('en-GB', { weekday:'long' });
    countByDay[day] = (countByDay[day] || 0) + 1;
  });
  let busiestDay = '—', busiestCnt = 0;
  Object.entries(countByDay).forEach(([day, c]) => { if (c > busiestCnt) { busiestDay = day; busiestCnt = c; } });
  document.getElementById('stat-day').textContent = busiestDay;
  document.getElementById('stat-day-sub').textContent = busiestCnt ? `${busiestCnt} x logs` : '';

  /* Frequency bars */
  const freqCard = document.getElementById('freq-card');
  freqCard.innerHTML = '';
  const maxCnt = Math.max(...Object.values(countByEm), 1);
  emotions.forEach(em => {
    const cnt = countByEm[em.value] || 0;
    const pct = Math.round((cnt / total) * 100) || 0;
    const barW = Math.round((cnt / maxCnt) * 100);
    const row = document.createElement('div'); row.className = 'freq-row';
    row.innerHTML = `
      <div class="freq-label">${em.name}</div>
      <div class="freq-bar-wrap">
        <div class="freq-bar-fill" style="width:${barW}%;background:${getCol(em.name)}"></div>
      </div>
      <div class="freq-pct">${pct}%</div>`;
    freqCard.appendChild(row);
  });

  /* Heatmap */
  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const slots = ['AM','PM'];

  // empty top-left corner
  heatmap.appendChild(Object.assign(document.createElement('div'), {}));
  days.forEach(d => {
    const h = document.createElement('div'); h.className = 'hm-day-header'; h.textContent = d;
    heatmap.appendChild(h);
  });

  slots.forEach(slot => {
    const lbl = document.createElement('div'); lbl.className = 'hm-row-label'; lbl.textContent = slot;
    heatmap.appendChild(lbl);
    days.forEach((_, di) => {
      const cell = document.createElement('div'); cell.className = 'hm-cell';
      // count entries for this day+slot
      const { start: ws } = getWindowBounds();
      const dayEntries = filtered.filter(d => {
        const ts = new Date(d.timestamp.replace(' ','T') + 'Z');
        const tsDay = (ts.getDay() + 6) % 7; // Mon=0
        const isAM = ts.getHours() < 12;
        return tsDay === di && (slot === 'AM' ? isAM : !isAM);
      });
      if (dayEntries.length > 0) {
        const topEm = getEmotionByKey(emotions, dayEntries[dayEntries.length - 1].button_value);
        const alpha = Math.min(0.3 + (dayEntries.length / 5) * 0.7, 1);
        cell.style.background = getCol(topEm.name);
        cell.style.opacity = alpha;
      }
      heatmap.appendChild(cell);
    });
  });

  /* Weekly Patterns */
  const pCard = document.getElementById('patterns-card');
  pCard.innerHTML = '';
  const patterns = generatePatterns(filtered);
  patterns.forEach(p => {
    const item = document.createElement('div'); item.className = 'pattern-item';
    item.innerHTML = `<span class="pattern-icon">✿</span><span>${p}</span>`;
    pCard.appendChild(item);
  });
}

function generatePatterns(filtered) {
  if (!filtered.length) return ['Not enough data yet. Keep logging your emotions!'];

  const patterns = [];
  const countByEm = {};
  filtered.forEach(d => { countByEm[d.button_value] = (countByEm[d.button_value] || 0) + 1; });

  // Most felt
  let mostVal = null, mostCnt = 0;
  Object.entries(countByEm).forEach(([v, c]) => { if (c > mostCnt) { mostVal = +v; mostCnt = c; } });
  if (mostVal) {
    const em = getEmotionByKey(emotions, mostVal);
    patterns.push(`${em.name} was your most logged emotion this period with ${mostCnt} entries.`);
  }

  // Busiest day
  const countByDay = {};
  filtered.forEach(d => {
    const ts = new Date(d.timestamp.replace(' ','T') + 'Z');
    const day = ts.toLocaleDateString('en-GB', { weekday:'long' });
    countByDay[day] = (countByDay[day] || 0) + 1;
  });
  const busiest = Object.entries(countByDay).sort((a,b) => b[1]-a[1])[0];
  if (busiest) patterns.push(`${busiest[0]} had the most logs this week with ${busiest[1]} entries.`);

  // Calmest day
  const calmVal = emotions.find(e => e.name === 'Calm')?.value;
  if (calmVal) {
    const calmByDay = {};
    filtered.filter(d => d.button_value === calmVal).forEach(d => {
      const ts = new Date(d.timestamp.replace(' ','T') + 'Z');
      const day = ts.toLocaleDateString('en-GB', { weekday:'long' });
      calmByDay[day] = (calmByDay[day] || 0) + 1;
    });
    const calmest = Object.entries(calmByDay).sort((a,b) => b[1]-a[1])[0];
    if (calmest) patterns.push(`${calmest[0]} is consistently your calmest day with ${calmest[1]} Calm logs.`);
  }

  if (patterns.length < 2) patterns.push('Keep tracking to reveal more patterns about your emotional week.');
  return patterns;
}

/* ── mode & nav ── */
function setMode(m) {
  mode = m; weekOffset = 0;
  document.getElementById('tog-week').classList.toggle('active', m === 'week');
  document.getElementById('tog-month').classList.toggle('active', m === 'month');
  render();
}

document.getElementById('btn-prev').onclick = () => { weekOffset--; render(); };
document.getElementById('btn-next').onclick = () => { weekOffset++; render(); };

/* ── data fetch ── */
const API_URL = 'https://web-production-e1116.up.railway.app/data';
const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

function mergeAndStore(existing, fresh) {
  const map = {};
  existing.forEach(d => map[d.id] = d);
  fresh.forEach(d => map[d.id] = d);
  const merged = Object.values(map);
  try { localStorage.setItem('feel_data', JSON.stringify(merged)); } catch {}
  return merged;
}

async function fetchData() {
  const urls = [API_URL + '?t=' + Date.now(), PROXY_URL + '&t=' + Date.now()];
  for (const url of urls) {
    try {
      const c = new AbortController();
      const t = setTimeout(() => c.abort(), 8000);
      const res = await fetch(url, { signal: c.signal }); clearTimeout(t);
      if (!res.ok) continue;
      const fresh = JSON.parse(await res.text());
      if (!Array.isArray(fresh) || !fresh.length) continue;
      allData = mergeAndStore(allData, fresh);
      render();
      return;
    } catch(e) { continue; }
  }
}

/* ── init ── */
try { if (typeof initNav === 'function') initNav('data'); } catch {}
render();
fetchData();
setInterval(fetchData, 30000);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') fetchData(); });
</script>
</body>
</html>
