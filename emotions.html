<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEEL — Emotions</title>
<link rel="stylesheet" href="shared.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root { --accent:#77DEF8; --w:390px; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    font-family:'Roboto',sans-serif;
    background:#F3FCFF;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow:hidden;
    height:100vh;
    width:100%;
  }

  .feel-root {
    width:var(--w);
    height:100vh;
    position:relative;
    overflow:visible;
  }

  .main-view {
    width:100%; height:100%;
    display:flex; flex-direction:column;
  }

  /* ── HEADER ── */
  .emo-header {
    padding:52px 28px 0;
    display:flex; align-items:flex-start; justify-content:center;
    position:relative; z-index:10; flex-shrink:0;
  }
  .header-center { text-align:center; }
  .header-center h1 {
    font-family:'Roboto',sans-serif;
    font-size:28px; font-weight:700; color:#1a1a1a;
  }
  .header-center p {
    font-size:14px; color:#555;
    margin-top:4px; line-height:1.5; font-weight:400;
  }
  .header-icon {
    position:absolute; right:28px; top:52px;
    width:44px; height:44px; background:#1a2a35; border-radius:50%;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  /* ── FLOWER STAGE ── */
  .flower-stage {
    flex:1; position:relative; overflow:visible; touch-action:none;
  }

  /* Aura blob — matches design spec */
  .aura-blob {
    position:absolute;
    width:420px; height:520px;
    border-radius:1193.706px;
    backdrop-filter:blur(3.502px);
    -webkit-backdrop-filter:blur(3.502px);
    filter:blur(28px);
    transition:background 0.55s ease; pointer-events:none;
    left:-120px; top:50%; transform:translateY(-52%);
  }

  /*
    The SVG flower:
    - Original canvas: 899 × 1654 px
    - Flower body center is approx at SVG coords (100, 860)
    - The right/active petal extends to ~x=730, y=700–1010
    - We scale the SVG to a render height of ~920px (scale ≈ 0.557)
    - At that scale, flower center lands at ~(56px, 479px) in rendered space
    - We push left:-56px so flower center is at x=0 (left edge)
    - Then top:50% + translateY(-479px) centers vertically
  */
  .flower-container {
    position:absolute;
    left:-250px;
    top:50%;
    width:501px;   /* 899 * 0.557 */
    height:921px;  /* 1654 * 0.557 */
    margin-top:-479px;
    pointer-events:none;
    transition:opacity 0.25s ease, margin-top 0.3s cubic-bezier(0.4,0,0.2,1);
    transform-origin: 306px 479px; /* flower body center */
    will-change: transform;
  }

  .flower-container svg {
    width:100%; height:100%;
    overflow:visible;
  }

  /* Petal fill transition */
  #active-petal, #stats-active-petal {
    transition:fill 0.45s ease;
  }

  /* ── PILL ── */
  .emo-pill {
    position:absolute;
    right:-190px; top:50%;
    width:435px; height:46px;
    transform:translateY(-50%);
    z-index:10;
    background:#ffffff;
    border:1px solid #CCCCCC;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-radius:20px; padding:0 16px;
    display:flex; align-items:center; gap:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.10);
    cursor:pointer; border:none;
    transition:box-shadow 0.12s;
  }
  .emo-pill:hover  { box-shadow:0 6px 28px rgba(0,0,0,0.15); }
  .emo-pill:active { opacity:0.9; }
  .emo-pill-left { display:flex; align-items:center; gap:10px; }
  .emo-pill-dot {
    width:24px; height:24px;
    border-radius:50%; flex-shrink:0;
    transition:background 0.4s ease;
  }
  .emo-pill-name {
    font-family:'Roboto',sans-serif;
    font-size:22px; font-weight:700;
    color:#B7B7B7;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .emo-pill-edit { color:#ccc; flex-shrink:0; margin-left:auto; }

  /* Swipe hints */
  .swipe-hint {
    position:absolute; left:50%; transform:translateX(-70%);
    display:flex; flex-direction:column; align-items:center; gap:5px;
    opacity:0.38; pointer-events:none; z-index:8;
  }
  .swipe-hint-top    { top:22px; }
  .swipe-hint-bottom { bottom:22px; }
  .swipe-hint span { font-size:10px; font-weight:600; color:#1a2a35; letter-spacing:0.08em; text-transform:uppercase; }

  /* ── STATS PANEL ── */
  .stats-panel {
    position:absolute; inset:0;
    background:#F3FCFF;
    z-index:20; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform 0.48s cubic-bezier(0.4,0,0.2,1);
    touch-action:none;
  }
  .stats-panel.open { transform:translateY(0); }
  .stats-close-hint {
    padding:14px 0 4px; display:flex; justify-content:center;
    cursor:pointer; opacity:0.38; flex-shrink:0;
  }
  .stats-header {
    padding:12px 24px 0; display:flex; align-items:flex-start; justify-content:center;
    position:relative; flex-shrink:0;
  }
  .stats-header-center { text-align:center; }
  .stats-header-center h2 { font-family:'DM Serif Display',serif; font-size:32px; font-weight:400; color:#1a2a35; }
  .stats-header-center p { font-size:14px; color:rgba(26,42,53,0.55); margin-top:4px; }
  .stats-header-icon {
    position:absolute; right:24px; top:12px;
    width:44px; height:44px; background:#1a2a35; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .stats-body { flex:1; display:flex; align-items:center; position:relative; overflow:hidden; }

  /* Flower in stats — same layout */
  .stats-flower-container {
    position:absolute;
    left:-250px; top:50%;
    width:501px; height:921px;
    margin-top:-479px;
    pointer-events:none;
  }
  .stats-flower-container svg { width:100%; height:100%; overflow:visible; }

  .stats-numbers {
    margin-left:198px; flex:1; padding-right:28px;
    display:flex; flex-direction:column; gap:20px;
  }
  .stat-emo-name { font-family:'DM Serif Display',serif; font-size:38px; color:#1a2a35; line-height:1; }
  .stat-all-label { font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:rgba(26,42,53,0.38); margin-top:3px; }
  .stat-big { font-family:'DM Serif Display',serif; font-size:58px; color:#1a2a35; line-height:1; }
  .stat-small-label { font-size:13px; color:rgba(26,42,53,0.5); margin-top:1px; }

  /* ── SELECT OVERLAY ── */
  .select-overlay {
    position:absolute; inset:0; z-index:40;
    background:linear-gradient(160deg,#EEF6FF 0%,#E0F5FC 40%,#F3FCFF 100%);
    transform:translateY(100%); transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
    display:flex; flex-direction:column;
  }
  .select-overlay.open { transform:translateY(0); }
  .select-header { padding:52px 24px 0; display:flex; align-items:center; flex-shrink:0; }
  .select-back { background:none; border:none; font-size:30px; color:#1a2a35; cursor:pointer; line-height:1; padding:0 14px 0 0; font-family:'DM Serif Display',serif; flex-shrink:0; }
  .select-header-text { flex:1; padding-right:8px; }
  .select-header-text h2 { font-family:'DM Serif Display',serif; font-size:24px; font-weight:400; color:#1a2a35; }
  .select-header-text p { font-size:13px; color:rgba(26,42,53,0.5); margin-top:3px; line-height:1.4; }
  .select-filters { display:flex; gap:8px; padding:18px 20px 0; overflow-x:auto; flex-shrink:0; }
  .select-filters::-webkit-scrollbar { display:none; }
  .cat-pill { flex-shrink:0; padding:7px 18px; border-radius:40px; font-size:13px; font-weight:500; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; background:rgba(255,255,255,0.65); color:rgba(26,42,53,0.65); transition:all 0.15s; }
  .cat-pill.active { background:#1a2a35; color:#fff; }
  .select-grid-scroll { flex:1; overflow-y:auto; padding:14px 16px 100px; }
  .select-grid-scroll::-webkit-scrollbar { display:none; }
  .select-grid-inner { background:rgba(255,255,255,0.50); border-radius:24px; padding:14px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; backdrop-filter:blur(6px); }
  .emo-card { background:rgba(255,255,255,0.72); border-radius:16px; padding:14px 8px 10px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; transition:transform 0.12s; }
  .emo-card:hover  { transform:scale(0.97); }
  .emo-card:active { transform:scale(0.94); }
  .emo-card-flower { width:58px; height:58px; border-radius:50%; flex-shrink:0; }
  .emo-card-name { font-size:11.5px; font-weight:700; color:#1a2a35; text-align:center; line-height:1.2; }
  .emo-card-cat  { font-size:10px; color:rgba(26,42,53,0.42); text-align:center; }
  .emo-card-btn { width:100%; padding:7px; background:#1a2a35; color:#fff; border:none; border-radius:9px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:2px; }
  .emo-card-btn.is-added   { background:#bbb; }
  .emo-card-btn.is-current { background:#52a86b; }
  .emo-card-btn.custom-btn { background:rgba(26,42,53,0.10); color:#1a2a35; }
</style>
</head>

<div class="feel-root">

        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><path d="M2 2 L10 10 L18 2" stroke="#1a2a35" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- ══ STATS PANEL ══ -->
  <div class="stats-panel" id="stats-panel">
    <div class="stats-close-hint" onclick="closeStats()">
      <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><path d="M2 10 L10 2 L18 10" stroke="#1a2a35" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="stats-header">
      <div class="stats-header-center">
        <h2>Emotions</h2>
        <p>Copywriting about stats<br>goes here</p>
      </div>
      <div class="stats-header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="2"/>

        </svg>
      </div>
    </div>
    <div class="stats-body">
      <div class="stats-flower-container">

            </filter>
            <clipPath id="c1">
              <rect width="1515.97" height="1478.43" fill="white" transform="translate(-606.077) rotate(7.06824)"/>

          </defs>

<script src="nav.js"></script>
<script>
const ALL_EMOTIONS = [
  { name:'Happiness',  cat:'Warmth',         color:'#F5A623', grad:'linear-gradient(135deg,#FFD580,#F5A623)' },
  { name:'Anger',      cat:'Social Tension', color:'#E05050', grad:'linear-gradient(135deg,#F08080,#C83030)' },
  { name:'Fear',       cat:'Withdrawal',     color:'#7B5EA7', grad:'linear-gradient(135deg,#A080C8,#5B3A80)' },
  { name:'Disgust',    cat:'Social Tension', color:'#7DB87D', grad:'linear-gradient(135deg,#98CC78,#559855)' },
  { name:'Sadness',    cat:'Withdrawal',     color:'#5AB8D8', grad:'linear-gradient(135deg,#77DEF8,#3A98B8)' },
  { name:'Surprise',   cat:'Social Tension', color:'#E88AE8', grad:'linear-gradient(135deg,#F0A0F0,#C060C0)' },
  { name:'Contempt',   cat:'Withdrawal',     color:'#6AAA6A', grad:'linear-gradient(135deg,#88CC88,#449944)' },
  { name:'Admiration', cat:'Withdrawal',     color:'#60A8D0', grad:'linear-gradient(135deg,#80C8F0,#3880A8)' },
  { name:'Anxiety',    cat:'Warmth',         color:'#E8A840', grad:'linear-gradient(135deg,#F8C860,#C88020)' },
  { name:'Pride',      cat:'Activation',     color:'#E84040', grad:'linear-gradient(135deg,#F06060,#B82020)' },
  { name:'Envy',       cat:'Warmth',         color:'#9B8BC8', grad:'linear-gradient(135deg,#C0A8E8,#7858B0)' },
  { name:'Nostalgia',  cat:'Warmth',         color:'#D4A870', grad:'linear-gradient(135deg,#E8C890,#B08040)' },
  { name:'Boredom',    cat:'Warmth',         color:'#A0A8B0', grad:'linear-gradient(135deg,#C0C8D0,#7880A0)' },
  { name:'Excitement', cat:'Activation',     color:'#F06040', grad:'linear-gradient(135deg,#F8A060,#D84020)' },
];

let trackedEmotions = [];
try { const s = localStorage.getItem('feel_emotions'); if (s) trackedEmotions = JSON.parse(s); } catch(e) {}
if (!trackedEmotions.length) {
  trackedEmotions = [{ name:'Anger' },{ name:'Happiness' },{ name:'Sadness' },{ name:'Envy' },{ name:'Contempt' }];
}
function saveTracked() { try { localStorage.setItem('feel_emotions', JSON.stringify(trackedEmotions)); } catch(e) {} }
function getEmo(name) { return ALL_EMOTIONS.find(e => e.name === name) || { name, cat:'', color:'#aaa', grad:'linear-gradient(135deg,#ccc,#999)' }; }

let currentIdx = 0;

function applyEmotion(name, animate) {
  const emo = getEmo(name);
  const c = emo.color;
  if (animate) {
    const container = document.getElementById('flower-container');
    container.style.transition = 'margin-top 0.28s ease, opacity 0.22s ease';
    container.style.opacity = '0.15';
    container.style.marginTop = animate === 'up' ? '-451px' : '-507px';
    setTimeout(() => {
      setPetalColor(c);
      container.style.marginTop = '-479px';
      container.style.opacity = '1';
    }, 150);
  } else {
    setPetalColor(c);
  }

  // convert hex to rgba for spec-accurate gradient
  const [ar,ag,ab] = hexToRgb(c);
  document.getElementById('aura-blob').style.background = `linear-gradient(179deg, rgba(${ar},${ag},${ab},0.35) 13.29%, rgba(255,255,255,0.00) 49.11%)`;
  document.getElementById('pill-dot').style.background = c;
  document.getElementById('pill-name').textContent = name;
  document.getElementById('stat-name').textContent = name;
}

function setPetalColor(c) {
  const p1 = document.getElementById('active-petal');
  const p2 = document.getElementById('stats-active-petal');
  if (p1) p1.setAttribute('fill', c);
  if (p2) p2.setAttribute('fill', c);
}

function showEmotion(idx, dir) {
  currentIdx = ((idx % trackedEmotions.length) + trackedEmotions.length) % trackedEmotions.length;
  applyEmotion(trackedEmotions[currentIdx].name, dir || null);
}

// ── Live drag-to-rotate swipe ──
const stage = document.getElementById('flower-stage');
const container = document.getElementById('flower-container');

let dragStartY = 0;
let isDragging = false;
let dragCommitted = false; // have we crossed the threshold?
const DRAG_THRESHOLD = 60;  // px before snap commits
const ROTATE_MAX = 45;       // max rotation degrees during drag
const STATS_THRESHOLD = 80;  // drag DOWN this far to open stats

// Hex → RGB helper
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function lerpColor(c1, c2, t) {
  const [r1,g1,b1] = hexToRgb(c1);
  const [r2,g2,b2] = hexToRgb(c2);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function onDragStart(y) {
  isDragging = true;
  dragStartY = y;
  dragCommitted = false;
  // kill any ongoing transition so drag feels instant
  container.style.transition = 'none';
}

function onDragMove(y) {
  if (!isDragging) return;
  const dy = y - dragStartY;

  // Downward drag → stats (no rotation, just hint)
  if (dy > 0) {
    container.style.transform = `translateY(${Math.min(dy * 0.15, 18)}px)`;
    return;
  }

  // Upward drag → rotate + blend color toward next emotion
  const progress = Math.min(Math.abs(dy) / DRAG_THRESHOLD, 1);
  const rotation = -progress * ROTATE_MAX;
  const lift     = progress * 24;

  container.style.transform = `translateY(${-lift}px) rotate(${rotation}deg)`;

  // Color blend: current → next
  const nextIdx = ((currentIdx + 1) % trackedEmotions.length + trackedEmotions.length) % trackedEmotions.length;
  const fromColor = getEmo(trackedEmotions[currentIdx].name).color;
  const toColor   = getEmo(trackedEmotions[nextIdx].name).color;
  const blended   = lerpColor(fromColor, toColor, progress);

  setPetalColor(blended);
  document.getElementById('aura-blob').style.background = blended;
  document.getElementById('pill-dot').style.background = blended;

  // Fade pill name out as we progress
  const pill = document.getElementById('pill-name');
  pill.style.opacity = String(1 - progress * 0.5);
}

function onDragEnd(y) {
  if (!isDragging) return;
  isDragging = false;
  const dy = y - dragStartY;

  // Restore smooth transition
  container.style.transition = 'transform 0.45s cubic-bezier(0.34,1.4,0.64,1), opacity 0.3s ease, margin-top 0.3s ease';

  if (dy > STATS_THRESHOLD) {
    // snap back and open stats
    container.style.transform = 'translateY(0) rotate(0deg)';
    openStats();
    return;
  }

  if (dy < -DRAG_THRESHOLD * 0.55) {
    // crossed threshold → snap to next emotion with spin-through
    const nextIdx = ((currentIdx + 1) % trackedEmotions.length + trackedEmotions.length) % trackedEmotions.length;
    currentIdx = nextIdx;
    const emo = getEmo(trackedEmotions[currentIdx].name);

    // Spin flower an extra quarter turn then back to 0
    container.style.transform = 'translateY(-10px) rotate(-55deg)';
    setTimeout(() => {
      container.style.transition = 'transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';
      container.style.transform = 'translateY(0) rotate(0deg)';
    }, 60);

    setPetalColor(emo.color);
    document.getElementById('aura-blob').style.background = emo.color;
    document.getElementById('pill-dot').style.background = emo.color;
    document.getElementById('pill-name').textContent = emo.name;
    document.getElementById('pill-name').style.opacity = '1';
    document.getElementById('stat-name').textContent = emo.name;
  } else {
    // didn't reach threshold → bounce back
    container.style.transform = 'translateY(0) rotate(0deg)';
    const emo = getEmo(trackedEmotions[currentIdx].name);
    setPetalColor(emo.color);
    document.getElementById('aura-blob').style.background = emo.color;
    document.getElementById('pill-dot').style.background = emo.color;
    document.getElementById('pill-name').style.opacity = '1';
  }
}

// Touch
stage.addEventListener('touchstart', e => onDragStart(e.touches[0].clientY), { passive:true });
stage.addEventListener('touchmove',  e => onDragMove(e.touches[0].clientY),  { passive:true });
stage.addEventListener('touchend',   e => onDragEnd(e.changedTouches[0].clientY), { passive:true });

// Mouse
stage.addEventListener('mousedown', e => { e.preventDefault(); onDragStart(e.clientY); });
window.addEventListener('mousemove', e => { if (isDragging) onDragMove(e.clientY); });
window.addEventListener('mouseup',   e => { if (isDragging) onDragEnd(e.clientY); });

const statsPanel = document.getElementById('stats-panel');
let sTouchY0 = 0;
statsPanel.addEventListener('touchstart', e => { sTouchY0 = e.touches[0].clientY; }, { passive:true });
statsPanel.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - sTouchY0 > 50) closeStats(); }, { passive:true });

function openStats()  { statsPanel.classList.add('open'); }
function closeStats() { statsPanel.classList.remove('open'); }

let editingSlot = 0;
function openSelect() {
  editingSlot = currentIdx;
  buildFilters(); buildGrid(null);
  document.getElementById('select-overlay').classList.add('open');
}
function closeSelect() { document.getElementById('select-overlay').classList.remove('open'); }

function buildFilters() {
  const row = document.getElementById('select-filters');
  if (row.dataset.built) return;
  row.dataset.built = '1';
  const cats = ['All', ...new Set(ALL_EMOTIONS.map(e => e.cat))];
  cats.forEach(cat => {
    const p = document.createElement('button');
    p.className = 'cat-pill' + (cat === 'All' ? ' active' : '');
    p.textContent = cat;
    p.onclick = () => {
      row.querySelectorAll('.cat-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      buildGrid(cat === 'All' ? null : cat);
    };
    row.appendChild(p);
  });
}

function buildGrid(filterCat) {
  const grid = document.getElementById('select-grid');
  grid.innerHTML = '';
  const list = filterCat ? ALL_EMOTIONS.filter(e => e.cat === filterCat) : ALL_EMOTIONS;
  const curName = trackedEmotions[editingSlot]?.name;
  list.forEach(emo => {
    const isCur = emo.name === curName;
    const isTracked = trackedEmotions.some((t, i) => t.name === emo.name && i !== editingSlot);
    const card = document.createElement('div');
    card.className = 'emo-card';
    card.innerHTML = `
      <div class="emo-card-flower" style="background:${emo.grad}"></div>
      <div class="emo-card-name">${emo.name}</div>
      <div class="emo-card-cat">${emo.cat}</div>
      <button class="emo-card-btn ${isCur?'is-current':isTracked?'is-added':''}" ${isTracked&&!isCur?'disabled':''}>${isCur?'Selected':isTracked?'Added':'Add'}</button>`;
    card.querySelector('button').onclick = ev => {
      ev.stopPropagation();
      if (isTracked && !isCur) return;
      trackedEmotions[editingSlot] = { name: emo.name };
      saveTracked(); closeSelect(); showEmotion(editingSlot, 'up');
    };
    grid.appendChild(card);
  });
  const custom = document.createElement('div');
  custom.className = 'emo-card';
  custom.innerHTML = `<div class="emo-card-flower" style="background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a2a35;border:2px solid rgba(26,42,53,0.12)">+</div><div class="emo-card-name">Custom Emotion</div><div class="emo-card-cat">Category</div><button class="emo-card-btn custom-btn">Add</button>`;
  grid.appendChild(custom);
}

try { initNav('emotions'); } catch(e) {}
applyEmotion(trackedEmotions[0].name, null);
</script>
</body>
